version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bou_sentinel"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI Backend ────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    network_mode: "host"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./data:/data
    command: >
      sh -c "python /app/scripts/wait_for_db.py &&
             python -c 'from app.db.session import create_tables; import asyncio; asyncio.run(create_tables())' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery Worker ──────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    network_mode: "host"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./data:/data
    command: >
      celery -A app.tasks.celery_app worker -l info -c 2

  # ── Celery Beat (scheduler) ────────────────────
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    network_mode: "host"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: >
      celery -A app.tasks.celery_app beat -l info

  # ── Next.js Frontend ───────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    network_mode: "host"
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata: